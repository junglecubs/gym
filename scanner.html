<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubs Sports Fest - Ticket Scanner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ecf7f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            background: #287844;
            color: white;
            width: 100%;
            padding: 15px 0;
            text-align: center;
            font-size: 20px;
            font-weight: 900;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #reader-container {
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 10px;
            box-sizing: border-box;
        }

        #reader {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
        }

        /* Result Panel */
        .result-panel {
            width: 90%;
            max-width: 480px;
            margin: 10px auto;
            padding: 20px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            display: none;
            box-sizing: border-box;
        }

        .status-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .status-text {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 15px;
        }

        .success {
            color: #28a745;
        }

        .error {
            color: #dc3545;
        }

        .ticket-info {
            text-align: left;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .ticket-info strong {
            color: #333;
        }

        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }

        .btn.scan-next {
            background: #287844;
        }

        /* --- html5-qrcode UI Overrides to make controls Massive --- */
        #reader__dashboard_section_csr button {
            padding: 15px 20px !important;
            font-size: 18px !important;
            background-color: #287844 !important;
            color: #ffffff !important;
            border: none !important;
            border-radius: 10px !important;
            margin: 10px 0 !important;
            width: 100% !important;
            font-weight: bold;
            cursor: pointer;
        }

        #reader__dashboard_section_csr span {
            font-size: 18px !important;
        }

        #reader__camera_selection {
            padding: 15px !important;
            font-size: 18px !important;
            width: 100% !important;
            border-radius: 10px !important;
            border: 2px solid #287844 !important;
            margin: 10px 0 !important;
            background: #fff;
        }

        #reader__camera_permission_button {
            padding: 20px !important;
            font-size: 20px !important;
            background-color: #007bff !important;
            border-radius: 10px !important;
            color: white !important;
            width: 100% !important;
            border: none !important;
            font-weight: 900 !important;
        }
    </style>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

    <div class="header">
        🦁 CSF Check-in Scanner
    </div>

    <div id="attendeeCount"
        style="text-align: center; margin-top: 10px; font-size: 18px; font-weight: bold; color: #287844; display: none;">
        Total Attendees: <span id="countValue">0</span>
    </div>

    <div id="reader-container">
        <div id="reader"></div>
    </div>

    <div class="result-panel" id="resultPanel">
        <div class="status-icon" id="statusIcon">✅</div>
        <div class="status-text success" id="statusText">Ticket Scanned!</div>

        <div class="ticket-info" id="ticketInfo">
            <!-- Data injected here -->
        </div>

        <button class="btn" id="btnConfirm" onclick="confirmCheckin()" style="display:none;">Confirm Check-in</button>
        <button class="btn scan-next" onclick="resetScanner()">Scan Next Ticket</button>
    </div>

    <script>
        // --- APP SCRIPT URL ---
        // Make sure to replace this with your actual Web App URL after deploying
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyQucEMo_wCS6tvqwbb-lEKb95WYcsGcysbyULe-Gbe0UbBCLrPTskUC_tMsp7tm-OkAQ/exec";

        let html5QrcodeScanner;
        let syncQueue = JSON.parse(localStorage.getItem('syncQueue') || '[]');
        let isSyncing = false;
        let autoResetTimeout = null;

        // Start the background sync loop every 3 seconds
        setInterval(processSyncQueue, 3000);

        // Initialize Scanner on Load
        window.onload = function () {
            startScanner();
            updatePendingCount();
        };

        function startScanner() {
            document.getElementById("reader-container").style.display = "block";
            document.getElementById("resultPanel").style.display = "none";

            if (!html5QrcodeScanner) {
                // Initialize the full scanner UI with memory logic
                html5QrcodeScanner = new Html5QrcodeScanner(
                    "reader",
                    {
                        fps: 10,
                        qrbox: { width: 250, height: 250 },
                        rememberLastUsedCamera: true
                    },
                    false
                );
                html5QrcodeScanner.render(onScanSuccess, onScanFailure);
            } else {
                // If it was already started and we just paused it, resume!
                // This prevents asking for permissions again.
                html5QrcodeScanner.resume();
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            // Pause scanner so it doesn't scan twice
            // The argument "true" means "also freeze the video feed"
            html5QrcodeScanner.pause(true);
            document.getElementById("reader-container").style.display = "none";
            processScannedData(decodedText);
        }

        function onScanFailure(error) {
            // handle scan failure invisibly
        }

        function processScannedData(rawText) {
            const panel = document.getElementById("resultPanel");
            const statusIcon = document.getElementById("statusIcon");
            const statusText = document.getElementById("statusText");
            const infoBox = document.getElementById("ticketInfo");
            const btnConfirm = document.getElementById("btnConfirm");

            panel.style.display = "block";
            btnConfirm.style.display = "none"; // Hide confirm button, we do instant check-ins now!

            try {
                // We updated the ticket HTML to generate JSON. 
                // It might be URL Encoded, so we decode it first.
                let decoded = decodeURIComponent(rawText);
                const data = JSON.parse(decoded);

                if (data.id && data.child) {

                    const scannedIds = JSON.parse(localStorage.getItem('scannedTicketIds') || '[]');

                    infoBox.innerHTML = `
                        <strong>ID:</strong> #${data.id}<br>
                        <strong>Child:</strong> ${data.child}<br>
                        <strong>Mobile:</strong> ${data.mobile}<br>
                        <strong>Batch:</strong> ${data.batch}
                    `;

                    if (scannedIds.includes(data.id)) {
                        // Already scanned!
                        statusIcon.textContent = "⚠️";
                        statusIcon.className = "status-icon error";
                        statusText.textContent = "Already Scanned!";
                        statusText.className = "status-text error";

                        // Auto-resume after short delay for user to read it
                        autoResetTimeout = setTimeout(resetScanner, 3000);
                    } else {
                        // New scan! Optimistic check-in.
                        scannedIds.push(data.id);
                        localStorage.setItem('scannedTicketIds', JSON.stringify(scannedIds));

                        // Queue for background sync to Google Sheets
                        queueForSync(data);

                        statusIcon.textContent = "🎉";
                        statusIcon.className = "status-icon success";
                        statusText.textContent = "Checked In!";
                        statusText.className = "status-text success";

                        // Auto-resume after 3 seconds, or user can tap 'Scan Next Ticket'
                        autoResetTimeout = setTimeout(resetScanner, 3000);
                    }

                } else {
                    throw new Error("Missing data fields");
                }

            } catch (err) {
                statusIcon.textContent = "❌";
                statusIcon.className = "status-icon error";
                statusText.textContent = "Invalid QR Code";
                statusText.className = "status-text error";
                infoBox.innerHTML = "This QR code doesn't belong to the Cubs Sports Fest system or is from an outdated ticket.";

                // Keep error up longer
                autoResetTimeout = setTimeout(resetScanner, 3000);
            }
        }

        function queueForSync(ticketData) {
            const payload = {
                action: 'checkin',
                id: ticketData.id,
                child: ticketData.child,
                mobile: ticketData.mobile,
                batch: ticketData.batch,
                timestamp: new Date().toISOString()
            };
            syncQueue.push(payload);
            localStorage.setItem('syncQueue', JSON.stringify(syncQueue));
            updatePendingCount();

            // Try syncing immediately
            processSyncQueue();
        }

        function processSyncQueue() {
            if (isSyncing || syncQueue.length === 0) return;

            isSyncing = true;
            // Peek at the first item
            const payload = syncQueue[0];

            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
                .then(response => response.json())
                .then(result => {
                    // Shift it out, it synced successfully (or was caught as a server-side duplicate)
                    syncQueue.shift();
                    localStorage.setItem('syncQueue', JSON.stringify(syncQueue));

                    // Update the global attendee count if provided
                    if (result.total_attendees !== undefined) {
                        document.getElementById("attendeeCount").style.display = "block";
                        document.getElementById("countValue").textContent = result.total_attendees;
                    }
                })
                .catch(err => {
                    console.error("Background sync failed, will retry: ", err);
                    // Leave in queue to try again later
                })
                .finally(() => {
                    isSyncing = false;
                    updatePendingCount();

                    // If there are more items, process them quickly rather than waiting 3 seconds
                    if (syncQueue.length > 0) {
                        setTimeout(processSyncQueue, 1000);
                    }
                });
        }

        function updatePendingCount() {
            let pendingDiv = document.getElementById("pendingSyncs");
            if (!pendingDiv && syncQueue.length > 0) {
                pendingDiv = document.createElement("div");
                pendingDiv.id = "pendingSyncs";
                pendingDiv.style.cssText = "position: fixed; bottom: 10px; right: 10px; background: #ffc107; color: #000; padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1000;";
                document.body.appendChild(pendingDiv);
            }

            if (pendingDiv) {
                if (syncQueue.length > 0) {
                    pendingDiv.style.display = "block";
                    pendingDiv.textContent = syncQueue.length + " Syncing...";
                } else {
                    pendingDiv.style.display = "none";
                }
            }
        }

        function resetScanner() {
            if (autoResetTimeout) {
                clearTimeout(autoResetTimeout);
                autoResetTimeout = null;
            }
            startScanner();
        }
    </script>
</body>

</html>
