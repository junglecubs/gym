<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubs Sports Fest - Ticket Scanner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ecf7f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            background: #287844;
            color: white;
            width: 100%;
            padding: 15px 0;
            text-align: center;
            font-size: 20px;
            font-weight: 900;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #reader-container {
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 10px;
            box-sizing: border-box;
        }

        #reader {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
        }

        /* Result Panel */
        .result-panel {
            width: 90%;
            max-width: 480px;
            margin: 10px auto;
            padding: 20px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            display: none;
            box-sizing: border-box;
        }

        .status-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .status-text {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 15px;
        }

        .success {
            color: #28a745;
        }

        .error {
            color: #dc3545;
        }

        .ticket-info {
            text-align: left;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .ticket-info strong {
            color: #333;
        }

        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }

        .btn.scan-next {
            background: #287844;
        }
    </style>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

    <div class="header">
        🦁 CSF Check-in Scanner
    </div>

    <div id="reader-container">
        <div id="reader"></div>
    </div>

    <div class="result-panel" id="resultPanel">
        <div class="status-icon" id="statusIcon">✅</div>
        <div class="status-text success" id="statusText">Ticket Scanned!</div>

        <div class="ticket-info" id="ticketInfo">
            <!-- Data injected here -->
        </div>

        <button class="btn" id="btnConfirm" onclick="confirmCheckin()" style="display:none;">Confirm Check-in</button>
        <button class="btn scan-next" onclick="resetScanner()">Scan Next Ticket</button>
    </div>

    <script>
        // --- APP SCRIPT URL ---
        // Make sure to replace this with your actual Web App URL after deploying
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyQucEMo_wCS6tvqwbb-lEKb95WYcsGcysbyULe-Gbe0UbBCLrPTskUC_tMsp7tm-OkAQ/exec";

        let html5QrCode;
        let currentTicketData = null;

        // Initialize Scanner on Load
        window.onload = function () {
            // We use Html5Qrcode instead of Html5QrcodeScanner 
            // to get direct control over the camera selection and pause/resume logic
            html5QrCode = new Html5Qrcode("reader");
            startScanner();
        };

        function startScanner() {
            document.getElementById("reader-container").style.display = "block";
            document.getElementById("resultPanel").style.display = "none";

            // If the scanner hasn't literally been started yet:
            if (!html5QrCode.isScanning) {
                // Request the rear camera by default ("environment")
                html5QrCode.start(
                    { facingMode: "environment" },
                    {
                        fps: 10,
                        qrbox: { width: 250, height: 250 }
                    },
                    onScanSuccess,
                    onScanFailure
                ).catch((err) => {
                    alert("Error starting camera: " + err);
                });
            } else {
                // If it was already started and we just paused it, resume!
                // This prevents asking for permissions again.
                html5QrCode.resume();
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            // Pause scanner so it doesn't scan twice
            html5QrCode.pause(true);
            document.getElementById("reader-container").style.display = "none";
            processScannedData(decodedText);
        }

        function onScanFailure(error) {
            // handle scan failure invisibly
        }

        function processScannedData(rawText) {
            const panel = document.getElementById("resultPanel");
            const statusIcon = document.getElementById("statusIcon");
            const statusText = document.getElementById("statusText");
            const infoBox = document.getElementById("ticketInfo");
            const btnConfirm = document.getElementById("btnConfirm");

            panel.style.display = "block";
            currentTicketData = null;

            try {
                // We updated the ticket HTML to generate JSON. 
                // It might be URL Encoded, so we decode it first.
                let decoded = decodeURIComponent(rawText);
                const data = JSON.parse(decoded);

                if (data.id && data.child) {
                    currentTicketData = data;

                    statusIcon.textContent = "✅";
                    statusIcon.className = "status-icon success";
                    statusText.textContent = "Valid Ticket Format";
                    statusText.className = "status-text success";

                    infoBox.innerHTML = `
            <strong>ID:</strong> #${data.id}<br>
            <strong>Child:</strong> ${data.child}<br>
            <strong>Mobile:</strong> ${data.mobile}<br>
            <strong>Batch:</strong> ${data.batch}
          `;

                    btnConfirm.style.display = "block";
                    btnConfirm.textContent = "Confirm Check-in";
                    btnConfirm.disabled = false;
                } else {
                    throw new Error("Missing data fields");
                }

            } catch (err) {
                statusIcon.textContent = "❌";
                statusIcon.className = "status-icon error";
                statusText.textContent = "Invalid QR Code";
                statusText.className = "status-text error";
                infoBox.innerHTML = "This QR code doesn't belong to the Cubs Sports Fest system or is from an outdated ticket.";
                btnConfirm.style.display = "none";
            }
        }

        function confirmCheckin() {
            if (!currentTicketData) return;

            const btnConfirm = document.getElementById("btnConfirm");
            btnConfirm.textContent = "Sending...";
            btnConfirm.disabled = true;

            const payload = {
                action: 'checkin',
                id: currentTicketData.id,
                child: currentTicketData.child,
                mobile: currentTicketData.mobile,
                batch: currentTicketData.batch,
                timestamp: new Date().toISOString()
            };

            // We use fetch to send data to Apps Script
            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Apps script requires no-cors sometimes for simple POSTs
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            }).then(() => {
                // Because of no-cors, we can't reliably read the JSON response, 
                // but if it didn't throw a network error, we assume success.
                document.getElementById("statusIcon").textContent = "🎉";
                document.getElementById("statusText").textContent = "Checked In Successfully!";
                btnConfirm.style.display = "none";
            }).catch(err => {
                alert("Network Error: Could not connect to tracker. Please check your internet connection.");
                btnConfirm.textContent = "Try Offline / Again";
                btnConfirm.disabled = false;
            });
        }

        function resetScanner() {
            startScanner();
        }
    </script>
</body>

</html>
